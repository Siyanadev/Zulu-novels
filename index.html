<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zulu Novels</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>📚 Zulu Novels</h1>
    <p>Read amazing stories anytime</p>
  </header>

  <!-- SEARCH -->
  <div class="search-box">
    <input id="search" type="text" placeholder="Search novels..." onkeyup="searchNovels()">
  </div>

  <!-- CATEGORY FILTER -->
  <div class="categories">
    <button onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('love')">Love</button>
    <button onclick="filterCategory('drama')">Drama</button>
  </div>

  <!-- WHATSAPP -->
  <div class="whatsapp">
    <a href="https://whatsapp.com/channel/0029VbBvfnH17EmonsvxQj13" target="_blank">
      📲 Join WhatsApp Channel
    </a>
  </div>

  <!-- NOVELS CONTAINER -->
  <div id="novel-list" class="novel-list">
    <!-- novels will load from app.js -->
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 Zulu Novels | All Rights Reserved</p>
  </footer>

  <script src="app.js"></script>

</body>
</html>
